name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            label: macOS-arm64
          - platform: macos-latest
            target: x86_64-apple-darwin
            label: macOS-x64
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            label: Linux-x64
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            label: Windows-x64

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install dependencies
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Encode ${{ github.ref_name }}"
          releaseBody: ""
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.target }}

  label-release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update release body with download guide
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"

          # Get all asset names from the release
          ASSETS=$(gh release view "$TAG" --json assets --jq '.assets[].name' | sort)

          # Build the download table
          BODY="## Download Encode

          | Platform | File | Description |
          |----------|------|-------------|"

          # Categorize each asset
          while IFS= read -r asset; do
            case "$asset" in
              *.dmg)
                if echo "$asset" | grep -qi "aarch64"; then
                  BODY="$BODY
          | **macOS (Apple Silicon)** | [\`$asset\`](https://github.com/${{ github.repository }}/releases/download/$TAG/$asset) | For M1/M2/M3/M4 Macs |"
                else
                  BODY="$BODY
          | **macOS (Intel)** | [\`$asset\`](https://github.com/${{ github.repository }}/releases/download/$TAG/$asset) | For older Intel-based Macs |"
                fi
                ;;
              *.AppImage)
                BODY="$BODY
          | **Linux** | [\`$asset\`](https://github.com/${{ github.repository }}/releases/download/$TAG/$asset) | Portable — runs on most distros |"
                ;;
              *.deb)
                BODY="$BODY
          | **Linux (Debian/Ubuntu)** | [\`$asset\`](https://github.com/${{ github.repository }}/releases/download/$TAG/$asset) | For apt-based distros |"
                ;;
              *.msi)
                BODY="$BODY
          | **Windows (MSI)** | [\`$asset\`](https://github.com/${{ github.repository }}/releases/download/$TAG/$asset) | Standard Windows installer |"
                ;;
              *.exe)
                BODY="$BODY
          | **Windows (EXE)** | [\`$asset\`](https://github.com/${{ github.repository }}/releases/download/$TAG/$asset) | NSIS installer |"
                ;;
            esac
          done <<< "$ASSETS"

          BODY="$BODY

          ### Which one should I download?

          - **Windows** — Download the \`.msi\` file (recommended) or \`.exe\`
          - **macOS (M1/M2/M3/M4)** — Download the \`aarch64.dmg\` file
          - **macOS (Intel)** — Download the \`x64.dmg\` file
          - **Linux** — Download \`.AppImage\` (works everywhere) or \`.deb\` (Debian/Ubuntu)

          > **Note:** macOS users may need to right-click → Open on first launch due to Gatekeeper."

          gh release edit "$TAG" --notes "$BODY" --draft=false
