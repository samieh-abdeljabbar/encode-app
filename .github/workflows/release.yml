name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            label: macOS-arm64
          - platform: macos-latest
            target: x86_64-apple-darwin
            label: macOS-x64
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            label: Linux-x64
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            label: Windows-x64

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install dependencies
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Encode ${{ github.ref_name }}"
          releaseBody: ""
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.target }}

  label-release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update release body with download guide
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"

          # Get all asset names from the release
          ASSETS=$(gh release view "$TAG" --json assets --jq '.assets[].name' | sort)

          # Build the download table
          BODY="## Download Encode

          | Platform | File | Description |
          |----------|------|-------------|"

          # Categorize each asset
          while IFS= read -r asset; do
            case "$asset" in
              *.dmg)
                if echo "$asset" | grep -qi "aarch64"; then
                  BODY="$BODY
          | **macOS (Apple Silicon)** | [\`$asset\`](https://github.com/${{ github.repository }}/releases/download/$TAG/$asset) | For M1/M2/M3/M4 Macs |"
                else
                  BODY="$BODY
          | **macOS (Intel)** | [\`$asset\`](https://github.com/${{ github.repository }}/releases/download/$TAG/$asset) | For older Intel-based Macs |"
                fi
                ;;
              *.AppImage)
                BODY="$BODY
          | **Linux** | [\`$asset\`](https://github.com/${{ github.repository }}/releases/download/$TAG/$asset) | Portable — runs on most distros |"
                ;;
              *.deb)
                BODY="$BODY
          | **Linux (Debian/Ubuntu)** | [\`$asset\`](https://github.com/${{ github.repository }}/releases/download/$TAG/$asset) | For apt-based distros |"
                ;;
              *.msi)
                BODY="$BODY
          | **Windows (MSI)** | [\`$asset\`](https://github.com/${{ github.repository }}/releases/download/$TAG/$asset) | Standard Windows installer |"
                ;;
              *.exe)
                BODY="$BODY
          | **Windows (EXE)** | [\`$asset\`](https://github.com/${{ github.repository }}/releases/download/$TAG/$asset) | NSIS installer |"
                ;;
            esac
          done <<< "$ASSETS"

          BODY="$BODY

          ### Which one should I download?

          - **Windows** — Download the \`.msi\` file (recommended) or \`.exe\`
          - **macOS (M1/M2/M3/M4)** — Download the \`aarch64.dmg\` file
          - **macOS (Intel)** — Download the \`x64.dmg\` file
          - **Linux** — Download \`.AppImage\` (works everywhere) or \`.deb\` (Debian/Ubuntu)

          > **Note:** macOS users may need to right-click → Open on first launch due to Gatekeeper."

          gh release edit "$TAG" --notes "$BODY" --draft=false

      - name: Assemble and upload latest.json for updater
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          REPO="${{ github.repository }}"
          VERSION="${TAG#v}"
          PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          mkdir -p sigs
          cd sigs
          gh release download "$TAG" --repo "$REPO" --pattern "*.sig" || true
          cd ..

          # Helper: read a sig file if present
          read_sig() {
            local file="$1"
            if [ -f "sigs/$file" ]; then
              cat "sigs/$file"
            else
              echo ""
            fi
          }

          # Find the actual asset names from the release (they contain the version)
          ASSETS=$(gh release view "$TAG" --repo "$REPO" --json assets --jq '.assets[].name')

          # macOS asset names look like: Encode.app.tar.gz (aarch64/x86_64 builds go to separate targets)
          # Linux AppImage, Windows MSI
          DARWIN_ARM_ARCHIVE=$(echo "$ASSETS" | grep -E "aarch64.*\.app\.tar\.gz$" | head -1 || true)
          DARWIN_X86_ARCHIVE=$(echo "$ASSETS" | grep -E "x64.*\.app\.tar\.gz$" | head -1 || true)
          LINUX_APPIMAGE=$(echo "$ASSETS" | grep -E "\.AppImage$" | head -1 || true)
          WINDOWS_MSI=$(echo "$ASSETS" | grep -E "\.msi$" | head -1 || true)

          DARWIN_ARM_SIG=$(read_sig "${DARWIN_ARM_ARCHIVE}.sig")
          DARWIN_X86_SIG=$(read_sig "${DARWIN_X86_ARCHIVE}.sig")
          LINUX_SIG=$(read_sig "${LINUX_APPIMAGE}.sig")
          WINDOWS_SIG=$(read_sig "${WINDOWS_MSI}.sig")

          BASE_URL="https://github.com/${REPO}/releases/download/${TAG}"

          # Assemble latest.json using jq for proper escaping
          jq -n \
            --arg version "$VERSION" \
            --arg pub_date "$PUB_DATE" \
            --arg notes "See release notes at https://github.com/${REPO}/releases/tag/${TAG}" \
            --arg darwin_arm_sig "$DARWIN_ARM_SIG" \
            --arg darwin_arm_url "${BASE_URL}/${DARWIN_ARM_ARCHIVE}" \
            --arg darwin_x86_sig "$DARWIN_X86_SIG" \
            --arg darwin_x86_url "${BASE_URL}/${DARWIN_X86_ARCHIVE}" \
            --arg linux_sig "$LINUX_SIG" \
            --arg linux_url "${BASE_URL}/${LINUX_APPIMAGE}" \
            --arg windows_sig "$WINDOWS_SIG" \
            --arg windows_url "${BASE_URL}/${WINDOWS_MSI}" \
            '{
              version: $version,
              notes: $notes,
              pub_date: $pub_date,
              platforms: {
                "darwin-aarch64": { signature: $darwin_arm_sig, url: $darwin_arm_url },
                "darwin-x86_64":  { signature: $darwin_x86_sig, url: $darwin_x86_url },
                "linux-x86_64":   { signature: $linux_sig,      url: $linux_url },
                "windows-x86_64": { signature: $windows_sig,    url: $windows_url }
              }
            }' > latest.json

          cat latest.json

          gh release upload "$TAG" latest.json --repo "$REPO" --clobber
